name: Capture interpreter security PR failure

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Capture latest direct runner failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          workflow='Interpreter security v0.1.1 direct runner'
          branch='agent/interpreter-security-v0.1.1-runner'
          for attempt in $(seq 1 40); do
            record="$(gh run list --workflow "$workflow" --branch "$branch" --limit 1 --json databaseId,status,conclusion --jq '.[0] | [.databaseId,.status,.conclusion] | @tsv')"
            run_id="$(printf '%s' "$record" | cut -f1)"
            status="$(printf '%s' "$record" | cut -f2)"
            conclusion="$(printf '%s' "$record" | cut -f3)"
            if [ -n "$run_id" ] && [ "$status" = completed ]; then
              {
                echo "run_id=$run_id"
                echo "status=$status"
                echo "conclusion=$conclusion"
                echo
                gh run view "$run_id" --log-failed || gh run view "$run_id" --log
              } > /tmp/interpreter-security-run.log 2>&1
              break
            fi
            sleep 3
          done
          test -s /tmp/interpreter-security-run.log

      - name: Publish exact log
        run: |
          git switch -C agent/interpreter-security-v0.1.1-report origin/main
          cp /tmp/interpreter-security-run.log interpreter-security-run.log
          git config user.name "bugsbuny243"
          git config user.email "240416572+bugsbuny243@users.noreply.github.com"
          git add interpreter-security-run.log
          git commit -m "capture interpreter security failure [skip ci]"
          git push --force origin agent/interpreter-security-v0.1.1-report
