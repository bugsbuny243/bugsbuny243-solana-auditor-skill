name: Verbatim security v0.1.1 validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout runner branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Preserve verbatim writers
        run: |
          cp .github/scripts/write_security_v011_verbatim.py /tmp/write_security_v011_verbatim.py
          cp .github/scripts/write_security_v011_verbatim_tests_docs.py /tmp/write_security_v011_verbatim_tests_docs.py
          python - <<'PY'
          from pathlib import Path

          for name in (
              "/tmp/write_security_v011_verbatim.py",
              "/tmp/write_security_v011_verbatim_tests_docs.py",
          ):
              path = Path(name)
              text = path.read_text(encoding="utf-8")
              text = text.replace('": \'\'\'', '": r\'\'\'')
              path.write_text(text, encoding="utf-8")
          PY

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reset to current main
        run: |
          git fetch origin main agent/interpreter-security-v0.1.1-direct
          git switch -C agent/interpreter-security-v0.1.1-direct origin/main

      - name: Write five files verbatim
        run: |
          python /tmp/write_security_v011_verbatim.py
          python /tmp/write_security_v011_verbatim_tests_docs.py

      - name: Verify changed file boundary
        run: |
          actual="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' docs/language-core.md interpreter.py semantic.py tests/test_interpreter.py tests/test_semantic.py | sort)"
          printf 'Changed files:\n%s\n' "$actual"
          test "$actual" = "$expected"

      - name: Run unit tests
        id: unit_tests
        run: |
          set +e
          python -m unittest discover -s tests -v > /tmp/verbatim-unit-tests.log 2>&1
          status=$?
          cat /tmp/verbatim-unit-tests.log
          exit "$status"

      - name: Publish exact unit-test failure
        if: ${{ failure() && steps.unit_tests.outcome == 'failure' }}
        run: |
          git switch -C agent/verbatim-security-v0.1.1-report origin/main
          cp /tmp/verbatim-unit-tests.log verbatim-unit-tests.log
          git config user.name "bugsbuny243"
          git config user.email "240416572+bugsbuny243@users.noreply.github.com"
          git add verbatim-unit-tests.log
          git commit -m "capture verbatim unit test failure [skip ci]"
          git push --force origin agent/verbatim-security-v0.1.1-report

      - name: Check capability example
        run: python koschei.py check examples/capability.ks

      - name: Check runtime demo
        run: python koschei.py check examples/runtime_demo.ks

      - name: Run runtime demo
        run: python koschei.py run examples/runtime_demo.ks

      - name: Check control flow example
        run: python koschei.py check examples/control_flow.ks

      - name: Run control flow example
        run: python koschei.py run examples/control_flow.ks

      - name: Check showcase example
        run: python koschei.py check examples/showcase.ks

      - name: Run showcase example
        run: python koschei.py run examples/showcase.ks

      - name: Commit and push verified result
        run: |
          git config user.name "bugsbuny243"
          git config user.email "240416572+bugsbuny243@users.noreply.github.com"
          git add interpreter.py semantic.py tests/test_interpreter.py tests/test_semantic.py docs/language-core.md
          git commit -m "security v0.1.1: redirect confinement (KS3402), unhandled error values (KS1401), call depth limit (KS3105)"
          git push --force-with-lease origin agent/interpreter-security-v0.1.1-direct
