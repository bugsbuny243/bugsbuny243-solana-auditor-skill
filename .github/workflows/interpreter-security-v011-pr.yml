name: Interpreter security v0.1.1 direct runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout runner branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preserve direct editor
        run: |
          cp .github/scripts/apply_interpreter_security_v011.py /tmp/apply_interpreter_security_v011.py
          cp .github/scripts/fix_interpreter_security_editor.py /tmp/fix_interpreter_security_editor.py
          python /tmp/fix_interpreter_security_editor.py

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reset to current main
        run: |
          git fetch origin main
          git switch -C agent/interpreter-security-v0.1.1-direct origin/main

      - name: Apply findings sequentially and validate
        run: python /tmp/apply_interpreter_security_v011.py

      - name: Commit and push verified result
        run: |
          git config user.name "bugsbuny243"
          git config user.email "240416572+bugsbuny243@users.noreply.github.com"
          git add interpreter.py semantic.py tests/test_interpreter.py tests/test_semantic.py docs/language-core.md
          git commit -m "interpreter security fixes v0.1.1"
          git push --force-with-lease origin agent/interpreter-security-v0.1.1-direct
