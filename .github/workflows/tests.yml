name: Koschei Compiler Tests

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Diagnose safe type ABI emission
        run: PYTHONPATH=. python tests/test_native_safe_types.py NativeSafeTypesTests.test_emits_option_and_result_abi

      - name: Diagnose or-return lowering
        run: PYTHONPATH=. python tests/test_native_safe_types.py NativeSafeTypesTests.test_or_return_lowers_to_early_result_propagation

      - name: Diagnose constructor context error
        run: PYTHONPATH=. python tests/test_native_safe_types.py NativeSafeTypesTests.test_contextless_result_constructor_is_rejected

      - name: Diagnose Bool condition C formatting
        run: PYTHONPATH=. python tests/test_native_safe_types.py NativeSafeTypesTests.test_identifier_conditions_are_parenthesized_in_c

      - name: Diagnose native safe type execution
        run: PYTHONPATH=. python tests/test_native_safe_types.py NativeSafeTypesTests.test_native_safe_type_program_compiles_and_runs

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check capability example
        run: python koschei.py check examples/capability.ks

      - name: Check safe types example
        run: python koschei.py check examples/safe_types.ks

      - name: Check control flow example
        run: python koschei.py check examples/control_flow.ks

      - name: Check native safe types example
        run: python koschei.py check examples/native_safe_types.ks

      - name: Emit C source
        run: python koschei.py emit-c examples/hello.ks -o build/hello.c

      - name: Build native binary
        run: python koschei.py build examples/hello.ks -o build/hello

      - name: Run native binary
        run: |
          output="$(./build/hello)"
          test "$output" = $'Koschei\n1'

      - name: Run control flow binary
        run: |
          output="$(python koschei.py run examples/control_flow.ks)"
          test "$output" = $'3\n2\n1\nKoschei control flow: PASS'

      - name: Run native safe types binary
        run: |
          output="$(python koschei.py run examples/native_safe_types.ks)"
          test "$output" = 'Koschei native safe types: PASS'
