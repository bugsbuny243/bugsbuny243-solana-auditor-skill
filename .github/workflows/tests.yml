name: Koschei Compiler Tests

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check capability example
        run: python koschei.py check examples/capability.ks

      - name: Check runtime demo
        run: python koschei.py check examples/runtime_demo.ks

      - name: Run runtime demo
        run: python koschei.py run examples/runtime_demo.ks

      - name: Check control flow example
        run: python koschei.py check examples/control_flow.ks

      - name: Run control flow example
        run: |
          output="$(python koschei.py run examples/control_flow.ks)"
          test "$output" = $'3\n2\n1\nKoschei control flow: PASS'

      - name: Build native binary
        run: python koschei.py build examples/hello.ks -o /tmp/koschei-hello

      - name: Native binary matches interpreter
        run: |
          native="$(/tmp/koschei-hello)"
          interpreted="$(python koschei.py run examples/hello.ks)"
          test "$native" = "$interpreted"

      - name: Capability programs are rejected by native backend
        run: |
          if python koschei.py emit-go examples/showcase.ks; then
            echo "HATA: yetkili program native derlemede reddedilmeliydi" >&2
            exit 1
          fi

      - name: Capability manifest for showcase
        run: python koschei.py caps examples/showcase.ks

      - name: Pure example requests no capabilities
        run: python koschei.py caps examples/hello.ks --deny disk --deny net --deny env --deny process

      - name: Policy gate rejects undeclared network access
        run: |
          if python koschei.py caps examples/showcase.ks --deny net; then
            echo "HATA: politika kapısı ağ talebini reddetmeliydi" >&2
            exit 1
          fi


      - name: Examples stay canonically formatted
        run: |
          for file in examples/*.ks; do
            python koschei.py fmt --check "$file"
          done


      - name: Run data-structure example
        run: |
          output="$(python koschei.py run examples/holders.ks)"
          case "$output" in
            *KRITIK*) ;;
            *) echo "HATA: holders örneği beklenen çıktıyı vermedi" >&2; exit 1 ;;
          esac
