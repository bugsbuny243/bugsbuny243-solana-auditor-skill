name: Native v0.3 Acceptance Report

on:
  push:
    branches:
      - agent/native-go-v0.3-report
  pull_request:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run acceptance commands
        run: |
          set -e
          python -m unittest discover -s tests > /tmp/tests.log 2>&1
          tail -5 /tmp/tests.log

          echo "=== EMIT GO HEAD ==="
          python koschei.py emit-go examples/hello.ks | head -20

          echo "=== BUILD HELLO ==="
          python koschei.py build examples/hello.ks -o /tmp/koschei-hello
          echo "=== NATIVE HELLO ==="
          /tmp/koschei-hello
          echo "=== INTERPRETER HELLO ==="
          python koschei.py run examples/hello.ks

          echo "=== BUILD CONTROL FLOW ==="
          python koschei.py build examples/control_flow.ks -o /tmp/koschei-cf
          echo "=== NATIVE CONTROL FLOW ==="
          /tmp/koschei-cf

          echo "=== SHOWCASE NATIVE REJECTION ==="
          set +e
          python koschei.py emit-go examples/showcase.ks
          status=$?
          set -e
          echo "exit=$status"
          test "$status" -eq 1

          echo "=== EXPLAIN KS4001 ==="
          python koschei.py explain KS4001

          echo "=== CHECK SHOWCASE ==="
          python koschei.py check examples/showcase.ks
          echo "=== RUN SHOWCASE ==="
          python koschei.py run examples/showcase.ks
