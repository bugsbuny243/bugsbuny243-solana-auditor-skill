name: Koschei Compiler Tests

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Diagnose native safe type parsing
        run: python koschei.py ast examples/native_safe_types.ks > /dev/null

      - name: Diagnose native safe type semantics
        run: python koschei.py check examples/native_safe_types.ks

      - name: Diagnose native safe type C emission
        run: python koschei.py emit-c examples/native_safe_types.ks -o build/native_safe_types.c

      - name: Diagnose native safe type ABI text
        run: |
          grep -q 'ks_option_int_some' build/native_safe_types.c
          grep -q 'ks_result_int_error_err' build/native_safe_types.c
          grep -q 'if (!__ks_result_' build/native_safe_types.c

      - name: Diagnose native safe type execution
        run: |
          output="$(python koschei.py run examples/native_safe_types.ks)"
          test "$output" = 'Koschei native safe types: PASS'

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check capability example
        run: python koschei.py check examples/capability.ks

      - name: Check safe types example
        run: python koschei.py check examples/safe_types.ks

      - name: Check control flow example
        run: python koschei.py check examples/control_flow.ks

      - name: Check native safe types example
        run: python koschei.py check examples/native_safe_types.ks

      - name: Emit C source
        run: python koschei.py emit-c examples/hello.ks -o build/hello.c

      - name: Build native binary
        run: python koschei.py build examples/hello.ks -o build/hello

      - name: Run native binary
        run: |
          output="$(./build/hello)"
          test "$output" = $'Koschei\n1'

      - name: Run control flow binary
        run: |
          output="$(python koschei.py run examples/control_flow.ks)"
          test "$output" = $'3\n2\n1\nKoschei control flow: PASS'

      - name: Run native safe types binary
        run: |
          output="$(python koschei.py run examples/native_safe_types.ks)"
          test "$output" = 'Koschei native safe types: PASS'
