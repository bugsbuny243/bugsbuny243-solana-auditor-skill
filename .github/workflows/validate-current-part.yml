name: Validate current Koschei part

on:
  push:
    branches:
      - agent/caps-fmt-validation
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target part
        uses: actions/checkout@v4
        with:
          ref: agent/fmt-v0.5-part3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run FMT 3/3 acceptance
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -v
          for f in examples/*.ks; do python koschei.py fmt --check "$f"; done
          python koschei.py fmt --check examples/showcase.ks
          python koschei.py caps examples/showcase.ks
          python koschei.py run examples/showcase.ks
